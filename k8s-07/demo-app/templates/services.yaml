apiVersion: v1
kind: Service
metadata:
  name: "backend-service-{{ .Release.Name }}"
spec:
  type: ClusterIP
  selector:
    app: backend-app
  ports:
    - name: web
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: "frontend-service-{{ .Release.Name }}"
spec:
  type: ClusterIP
  selector:
    app: frontend-app
  ports:
    - name: web
      port: 80
      targetPort: 80  