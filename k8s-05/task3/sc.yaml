apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: demo-storage-class
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: demo-pv
spec:
  capacity:
    storage: 5Mi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: demo-storage-class
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /opt/data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-exchange-sc-pvc
spec:
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Mi
  storageClassName: demo-storage-class
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-exchange-sc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-exchange-sc-app
  template:
    metadata:
      labels:
        app: data-exchange-sc-app
    spec:
      containers:
      - name: data-exchange-sc-writer
        image: busybox
        command: ["/bin/sh", "-c"] 
        args: ["echo $(date) > /output/timestamp.out; sleep 3600"]
        volumeMounts:
        - name: data-exchange-sc-volume
          mountPath: /output
      - name: data-exchange-sc-reader
        image: busybox
        command: ["/bin/sh", "-c"]
        args: ["while [ ! -f /input/timestamp.out ]; do sleep 1; done; tail -f /input/timestamp.out"]
        volumeMounts:
        - name: data-exchange-sc-volume
          mountPath: /input
      volumes:
      - name: data-exchange-sc-volume
        persistentVolumeClaim:
          claimName: data-exchange-sc-pvc