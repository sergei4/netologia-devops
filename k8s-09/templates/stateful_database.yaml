apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        workload: stateful
      containers:
        - name: postgres
          image: postgres:16
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"